<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Age Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="background"></div>

<div class="container">
    <div class="card">

        <h1>👤 Face Age Predictor</h1>
        <p class="subtitle">AI-powered age group detection from facial images</p>

        <form method="POST" enctype="multipart/form-data">

            <div class="upload-area">
                <input type="file" name="image" id="fileInput" required>
                <label for="fileInput">
                    📁 Click to Upload Image
                </label>
            </div>

            <button type="submit" class="btn">Predict Age</button>

        </form>

        {% if image_path %}
        <div class="result">

            <img src="{{ image_path }}" alt="Uploaded Image">

            <h2>Prediction</h2>
            <p class="age">{{ prediction }}</p>

            <div class="confidence">
                <span>Confidence</span>
                <div class="progress">
                    <div class="progress-bar" style="width: {{ confidence*100 }}%"></div>
                </div>
                <p class="percent">{{ (confidence*100) | round(2) }}%</p>
            </div>

        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
