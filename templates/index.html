<!DOCTYPE html>
<html>
<head>
    <title>Face Age Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container">
    <h1>Face Age Group Predictor</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <button type="submit">Predict</button>
    </form>

    {% if image_path %}
        <div class="result">
            <img src="{{ image_path }}" width="250">
            <h2>Age Group: {{ prediction }}</h2>
            <h3>Confidence: {{ (confidence*100) | round(2) }}%</h3>
        </div>
    {% endif %}
</div>

</body>
</html>
